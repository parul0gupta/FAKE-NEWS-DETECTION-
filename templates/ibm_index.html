<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main-container">

    <div class="card">

        <div class="header">
            <h1>📰 Fake News Detection System</h1>

            <p class="subtitle">
                Detect Fake and Real News Using Machine Learning
            </p>
        </div>

        <div class="info-cards">

            <div class="info-box">
                <h3>⚡ Fast Analysis</h3>
                <p>Quick prediction results</p>
            </div>

            <div class="info-box">
                <h3>📊 ML Model</h3>
                <p>Logistic Regression</p>
            </div>

            <div class="info-box">
                <h3>✅ Classification</h3>
                <p>Fake or Real News</p>
            </div>

        </div>

        <form action="/predict" method="POST">

            <label for="news">Enter News Content</label>

            <textarea
                id="news"
                name="news"
                rows="10"
                placeholder="Paste or type the news article here..."
                required></textarea>

            <div class="button-group">

                <button type="submit">
                    Analyze News
                </button>

                <button type="reset" class="clear-btn">
                    Clear
                </button>

            </div>

        </form>

        {% if prediction_text %}
        <div class="result-box">

            <h2>Prediction Result</h2>

            <p>{{ prediction_text }}</p>

        </div>
        {% endif %}

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
