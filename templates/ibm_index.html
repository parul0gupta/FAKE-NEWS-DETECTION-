<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="main-container">

        <div class="card">

            <h1>Fake News Detection System</h1>

            <p class="subtitle">
                Detect whether a news article is Real or Fake using Machine Learning
            </p>

            <form action="/predict" method="POST">

                <label for="news">
                    Enter News Content
                </label>

                <textarea
                    id="news"
                    name="news"
                    rows="12"
                    placeholder="Paste or type the news article here..."
                    required></textarea>

                <div class="button-group">
                    <button type="submit">
                        Analyze News
                    </button>

                    <button type="reset" class="clear-btn">
                        Clear
                    </button>
                </div>

            </form>

            {% if prediction_text %}

            <div class="result-box">

                <h2>Prediction Result</h2>

                <p>{{ prediction_text }}</p>

            </div>

            {% endif %}

        </div>

    </div>

    <script src="{{ url_for('static', filename='ibm.js') }}"></script>

</body>
</html>
